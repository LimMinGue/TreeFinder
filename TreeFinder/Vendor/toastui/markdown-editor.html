<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="toastui-editor.css">
<link rel="stylesheet" href="toastui-editor-dark.css">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  #editor { height: 100vh; }
  /* 다크 모드에서 배경이 비치지 않게 */
  body.dark { background: #232428; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="toastui-editor.js"></script>
<script src="toastui-editor-ko-kr.js"></script>
<script>
let editor = null;
let ready = false;

window.onerror = function (message, source, line) {
  window.webkit.messageHandlers.tf.postMessage({ type: 'error', message: message + ' @' + line });
};

function tfInit(markdown, dark, language) {
  try {
    tfInitInner(markdown, dark, language);
  } catch (error) {
    window.webkit.messageHandlers.tf.postMessage({ type: 'error', message: String(error) });
  }
}

function tfInitInner(markdown, dark, language) {
  ready = false;
  if (editor) { editor.destroy(); editor = null; }
  document.body.classList.toggle('dark', dark);
  editor = new toastui.Editor({
    el: document.querySelector('#editor'),
    height: '100%',
    initialEditType: 'wysiwyg',
    previewStyle: 'tab',
    initialValue: markdown,
    theme: dark ? 'dark' : 'default',
    language: language || 'ko-KR',
    usageStatistics: false,
    autofocus: false,
    events: {
      change: function () {
        if (ready) { window.webkit.messageHandlers.tf.postMessage({ type: 'dirty' }); }
      }
    }
  });
  /* 초기 정규화 change 이벤트를 dirty로 오인하지 않게 잠시 뒤 활성화 */
  setTimeout(function () { ready = true; }, 300);
}

function tfGetMarkdown() { return editor ? editor.getMarkdown() : ''; }

/* ⌘S = 저장 요청을 네이티브로 */
document.addEventListener('keydown', function (event) {
  if ((event.metaKey || event.ctrlKey) && event.key === 's') {
    event.preventDefault();
    window.webkit.messageHandlers.tf.postMessage({ type: 'save' });
  }
});
</script>
</body>
</html>
